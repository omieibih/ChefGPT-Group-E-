<!DOCTYPE html>
<html>
<head>
    <title>Ingredients - ChefGPT</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🥘 Tell Us What You Have</h1>
        <p class="subtle">Cooking level selected: <strong>{{ experience_level|capitalize }}</strong></p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form action="/results" method="POST">
            <input type="hidden" name="experience_level" value="{{ experience_level }}">

            <label for="ingredients">🥦 What ingredients do you have?</label>
            <input type="text" id="ingredients" name="ingredients" placeholder="e.g. chicken, rice, broccoli" required>

            <label for="budget">💰 What's your budget for extra ingredients? (optional)</label>
            <input type="number" id="budget" name="budget" placeholder="e.g. 20" min="0" step="0.01">

            <button type="submit">Generate Recipes</button>
        </form>

        <a href="/" class="back-link">⬅ Back to experience selection</a>
    </div>
</body>
</html>
