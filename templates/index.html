<!DOCTYPE html>
<html>
<head>
    <title>ChefGPT</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>👨‍🍳 ChefGPT</h1>
        <p>Enter your ingredients and we'll suggest meals tailored to you!</p>

        <form action="/results" method="POST">
            <label for="ingredients">🥦 What ingredients do you have?</label>
            <input type="text" id="ingredients" name="ingredients" placeholder="e.g. chicken, rice, broccoli" required>

            <label for="budget">💰 What's your budget for extra ingredients? (optional)</label>
            <input type="number" id="budget" name="budget" placeholder="e.g. 20" min="0" step="0.01">

            <button type="submit">Generate Recipes</button>
        </form>
    </div>
</body>
</html>
